name: Parse CBR Data

on:
  schedule:
    # 15:00 UTC = 18:00 по Москве (ЦБ уже обновил данные)
    - cron: '0 15 * * *' 
  workflow_dispatch:

jobs:
  parse:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Важно для push

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install deps
        run: |
          npm install
          npm install -g tsx

      - name: Run parser
        run: npx tsx parser.ts

      - name: Commit result
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          # Добавляем все json файлы (и data.json и YYYY-MM-DD.json)
          git add *.json 
          git commit -m "update data: $(date +'%Y-%m-%d')" || echo "no changes"
          git push